# Deploys apps/docs (Astro + Starlight) to GitHub Pages on every push to
# main. Repo Settings → Pages → Source must be set to "GitHub Actions"
# for the deploy job to publish.
#
# Site URL is configured via STARLIGHT_SITE / STARLIGHT_BASE env vars —
# the Astro config reads them so the same code works for any host.

name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'apps/docs/**'
      - 'packages/shadstack-table/src/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

env:
  STARLIGHT_SITE: https://suleymanozkeskin.github.io
  STARLIGHT_BASE: /shadstack-table

jobs:
  docs-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Astro requires Node >= 22.12.0; the runner default (20.x) is too old.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build docs site
        run: bun run --filter=docs build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: apps/docs/dist

  deploy:
    needs: docs-build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
