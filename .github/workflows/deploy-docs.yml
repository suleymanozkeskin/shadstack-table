# Placeholder docs deploy workflow.
# Manual dispatch only until a docs site exists at apps/docs (or wherever).
# When the docs site lands:
#   1. Replace the placeholder build step with the real `bun run build`
#      for the docs app.
#   2. Re-enable push/pull_request triggers on `apps/docs/**`.
#   3. Configure GitHub Pages for the repo (Settings → Pages → "GitHub Actions").

name: Deploy docs to GitHub Pages

on:
  workflow_dispatch:
  # TODO: re-enable once apps/docs/ exists
  # push:
  #   branches: [main]
  #   paths:
  #     - 'apps/docs/**'
  #     - '.github/workflows/deploy-docs.yml'
  # pull_request:
  #   branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  docs-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build docs site
        run: |
          echo "TODO: replace with 'bun run --filter=docs build' once apps/docs exists"

      # TODO: enable once apps/docs/dist is the built output
      # - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
      #   with:
      #     path: apps/docs/dist

  deploy:
    needs: docs-build
    if: false # TODO: flip to `github.event_name == 'push' && github.ref == 'refs/heads/main'`
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
