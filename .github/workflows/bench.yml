# Bench workflow.
# Manual-dispatch only — render benchmarks are noisy and not useful as a
# blocking CI gate. Dispatchable once PR #38 (feat/render-benchmarks) lands
# and apps/bench/package.json exists; until then the job no-ops via
# hashFiles().

name: Bench

on:
  workflow_dispatch:

concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  bench:
    if: hashFiles('apps/bench/package.json') != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run benchmarks
        run: bun run bench
