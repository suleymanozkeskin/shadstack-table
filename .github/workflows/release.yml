# Placeholder release pipeline for the shadstack-table npm package.
# Manual dispatch only until the package is ready to publish; `publish`
# input defaults to false so accidental runs are no-ops.
# TODO before first real release:
#   1. Configure npm Trusted Publishing (OIDC) for the `shadstack-table`
#      package: https://docs.npmjs.com/trusted-publishers
#   2. Create a `npm` GitHub Environment with a required reviewer.
#   3. Uncomment the `npm publish` step below.
#   4. Add a CHANGELOG.md and bump the version in
#      packages/shadstack-table/package.json.

name: Release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish the built distribution to npm
        required: true
        default: false
        type: boolean

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  metadata:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Read package version
        id: version
        run: |
          version=$(node -p "require('./packages/shadstack-table/package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Show release metadata
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: echo "Preparing release for shadstack-table $VERSION"

  build:
    needs: metadata
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.2
          # No cache on release builds: avoids GitHub Actions cache poisoning.

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build package
        run: bun run --filter=shadstack-table build

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: shadstack-table-dist-${{ needs.metadata.outputs.version }}
          path: packages/shadstack-table/dist/*
          if-no-files-found: error

  publish:
    if: ${{ inputs.publish }}
    needs: [metadata, build]
    runs-on: ubuntu-latest
    environment:
      name: npm
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: shadstack-table-dist-${{ needs.metadata.outputs.version }}
          path: packages/shadstack-table/dist

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      # TODO: enable once npm Trusted Publishing is configured for the
      # `shadstack-table` package. --provenance requires id-token: write
      # (already granted above) and emits a Sigstore attestation linking
      # the published tarball to this workflow run.
      - name: Publish to npm (Trusted Publishing)
        if: false
        working-directory: packages/shadstack-table
        run: npm publish --provenance --access public
