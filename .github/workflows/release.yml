# Release pipeline for the shadstack-table npm package.
#
# Manual dispatch only — `publish: true` is required to actually upload.
# The publish job runs in the `npm` GitHub Environment (required reviewer),
# and uses npm Trusted Publishing (OIDC) with provenance — no NPM_TOKEN.

name: Release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish the built distribution to npm
        required: true
        default: false
        type: boolean

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  metadata:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Read package version
        id: version
        run: |
          version=$(node -p "require('./packages/shadstack-table/package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Show release metadata
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: echo "Preparing release for shadstack-table $VERSION"

  build:
    needs: metadata
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.2
          # No cache on release builds: avoids GitHub Actions cache poisoning.

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build package
        run: bun run --filter=shadstack-table build

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: shadstack-table-dist-${{ needs.metadata.outputs.version }}
          path: packages/shadstack-table/dist/*
          if-no-files-found: error

  publish:
    if: ${{ inputs.publish }}
    needs: [metadata, build]
    runs-on: ubuntu-latest
    environment:
      name: npm
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: shadstack-table-dist-${{ needs.metadata.outputs.version }}
          path: packages/shadstack-table/dist

      # Trusted Publishing requires Node >= 22.14.0 and npm >= 11.5.1.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm to >= 11.5.1
        run: npm install -g npm@latest

      - name: Publish to npm (Trusted Publishing)
        working-directory: packages/shadstack-table
        run: npm publish --provenance --access public
