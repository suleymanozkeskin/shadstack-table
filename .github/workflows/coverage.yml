# Placeholder coverage workflow.
# Manual dispatch only until a test suite exists. When tests land:
#   1. Replace the placeholder step with `bun test --coverage`
#      (or `vitest run --coverage` if vitest is added).
#   2. Re-enable the nightly cron schedule below.
#   3. Wire the badge commit job if a coverage badge is desired
#      (see task-lib/.github/workflows/coverage.yml for a template).

name: Coverage

on:
  # TODO: re-enable once tests exist
  # schedule:
  #   - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run coverage
        run: |
          echo "TODO: replace with 'bun test --coverage' once unit tests exist"
