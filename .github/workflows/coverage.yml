# Coverage workflow.
# Manual-dispatch only for now — coverage runs are slower than the standard
# CI gate. When the suite stabilizes, re-enable the nightly cron schedule
# and (optionally) wire a coverage-badge commit job.

name: Coverage

on:
  # TODO: re-enable once the suite stabilizes and we want a nightly trend.
  # schedule:
  #   - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run coverage
        run: bun run test:coverage
